<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bar Gestão Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans pb-24">

    <!-- CABEÇALHO -->
    <header class="p-4 bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
        <div class="flex justify-between items-center mb-4">
            <h1 class="font-black text-amber-500 uppercase italic tracking-tighter">BAR GESTÃO</h1>
            <div id="mesAtual" class="bg-amber-500 text-black px-2 py-1 rounded font-black text-[10px]">---</div>
        </div>
        <div class="flex gap-2">
            <div class="flex-1 bg-zinc-950 p-2 rounded border border-zinc-800 text-center">
                <p class="text-[8px] text-zinc-500 font-bold uppercase">Saldo</p>
                <p id="totalLucro" class="text-green-500 font-black text-lg font-mono">R$ 0,00</p>
            </div>
            <div class="flex-1 bg-zinc-950 p-2 rounded border border-zinc-800 text-center">
                <p class="text-[8px] text-red-500 font-bold uppercase">Despesas</p>
                <p id="totalGasto" class="text-red-500 font-black text-lg font-mono">R$ 0,00</p>
            </div>
        </div>
    </header>

    <!-- NAVEGAÇÃO -->
    <nav class="flex p-2 bg-zinc-900 gap-1 border-b border-zinc-800">
        <button onclick="tela('vendas')" class="flex-1 py-3 bg-amber-500 text-black font-black rounded-lg text-[10px]" id="b-vendas">BALCÃO</button>
        <button onclick="tela('config')" class="flex-1 py-3 bg-zinc-800 text-zinc-400 font-black rounded-lg text-[10px]" id="b-config">CARDÁPIO</button>
        <button onclick="tela('caixa')" class="flex-1 py-3 bg-zinc-800 text-zinc-400 font-black rounded-lg text-[10px]" id="b-caixa">CAIXA</button>
    </nav>

    <!-- TELA 1: BALCÃO -->
    <section id="t-vendas" class="p-4">
        <div class="flex gap-2 mb-6">
            <input id="nomeCliente" type="text" placeholder="Nome do Cliente" class="flex-1 p-4 rounded-xl bg-zinc-800 text-white font-bold border border-zinc-700 outline-none focus:border-amber-500">
            <button onclick="novaConta()" class="bg-amber-500 text-black px-6 rounded-xl font-black text-2xl shadow-lg active:scale-90 transition-transform">+</button>
        </div>
        <div id="listaContas" class="space-y-3"></div>
    </section>

    <!-- TELA 2: CARDÁPIO -->
    <section id="t-config" class="hidden p-4">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-black text-amber-500 uppercase italic">Meus Produtos</h2>
            <button onclick="novoItem()" class="bg-green-600 px-3 py-1 rounded font-black text-[10px] uppercase">+ Novo</button>
        </div>
        <div id="listaProdutos" class="space-y-4 mb-24"></div>
        <button onclick="salvarItens()" class="fixed bottom-4 left-4 right-4 bg-amber-500 text-black p-4 rounded-xl font-black shadow-2xl z-50 uppercase">Salvar Cardápio</button>
    </section>

    <!-- TELA 3: CAIXA -->
    <section id="t-caixa" class="hidden p-4">
        <div id="filtroMeses" class="flex gap-2 mb-4 overflow-x-auto pb-2"></div>
        <button onclick="lancarGasto()" class="w-full bg-red-900/20 text-red-500 border border-red-900 p-4 rounded-xl font-black text-xs uppercase mb-6">[-] Lançar Despesa</button>
        <div id="listaHist" class="space-y-2"></div>
    </section>

    <!-- MODAL DE LANÇAMENTO -->
    <div id="modal" class="hidden fixed inset-0 bg-black z-[100] flex flex-col p-6">
        <div class="flex justify-between items-start mb-4">
            <div>
                <h2 id="mNome" class="text-2xl font-black italic uppercase text-amber-500">---</h2>
                <div id="mTotal" class="text-4xl font-black text-white font-mono">R$ 0,00</div>
            </div>
            <button onclick="fecharModal()" class="text-4xl text-zinc-500">&times;</button>
        </div>
        
        <div class="bg-zinc-900 p-3 rounded-lg mb-4 border border-zinc-800">
            <p class="text-[9px] text-zinc-500 font-black uppercase mb-1 tracking-widest">Extrato detalhado:</p>
            <div id="mExtrato" class="text-sm text-green-400 font-bold leading-tight">Nenhum item adicionado...</div>
        </div>

        <div id="mGrid" class="grid grid-cols-2 gap-3 overflow-y-auto mb-4 pr-1"></div>
        
        <div class="mt-auto grid grid-cols-2 gap-2">
            <button onclick="finalizar(true)" class="bg-green-600 p-5 rounded-xl font-black text-[10px] uppercase flex flex-col items-center justify-center shadow-lg active:bg-green-700">
                <span>Pagar + WhatsApp</span>
                <span class="text-[8px] opacity-80">📱 ENVIAR CONTA</span>
            </button>
            <button onclick="finalizar(false)" class="bg-zinc-800 p-5 rounded-xl font-black text-[10px] uppercase flex flex-col items-center justify-center active:bg-zinc-700">
                <span>Apenas Pagar</span>
                <span class="text-[8px] opacity-50">SEM NOTIFICAR</span>
            </button>
        </div>
    </div>

    <script>
        // BANCO DE DADOS
        let db_p = JSON.parse(localStorage.getItem('bar_p')) || [{i:'🍺', n:'CERVEJA', p:10}, {i:'🍛', n:'REFEIÇÃO', p:25}];
        let db_c = JSON.parse(localStorage.getItem('bar_c')) || [];
        let db_h = JSON.parse(localStorage.getItem('bar_h')) || [];
        let idxAtivo = null;
        const emojis = ['🍺','🥤','💧','🍛','🥃','🍢','🍟','🍷','☕','🍦','🥡','🍰'];

        function mes() { 
            const d = new Date();
            return d.toLocaleDateString('pt-BR', {month:'long', year:'numeric'}).toUpperCase();
        }
        let fMes = mes();

        // NAVEGAÇÃO
        function tela(t) {
            ['vendas','config','caixa'].forEach(x => {
                document.getElementById('t-'+x).classList.add('hidden');
                document.getElementById('b-'+x).className = (x===t) ? "flex-1 py-3 bg-amber-500 text-black font-black rounded-lg text-[10px]" : "flex-1 py-3 bg-zinc-800 text-zinc-400 font-black rounded-lg text-[10px]";
            });
            document.getElementById('t-'+t).classList.remove('hidden');
            if(t==='config') renderConfig();
            if(t==='caixa') renderCaixa();
        }

        // ADICIONAR CLIENTE
        function novaConta() {
            const input = document.getElementById('nomeCliente');
            if(!input.value.trim()) return;
            
            // Cria objeto da conta com lista de itens vazia
            const nova = {
                nome: input.value.toUpperCase(),
                total: 0,
                lista_itens: []
            };
            
            db_c.push(nova);
            input.value = "";
            save(); 
            renderContas();
        }

        function renderContas() {
            document.getElementById('listaContas').innerHTML = db_c.map((c, i) => `
                <div onclick="abrirModal(${i})" class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 flex justify-between items-center active:bg-zinc-800 transition-all">
                    <div>
                        <p class="font-black italic uppercase text-lg leading-none mb-1">${c.nome}</p>
                        <p class="text-[9px] text-zinc-500 uppercase font-bold">${c.lista_itens.length} itens pedidos</p>
                    </div>
                    <span class="font-black text-amber-500 text-xl font-mono">R$ ${c.total.toFixed(2)}</span>
                </div>`).join('');
            resumo();
        }

        // MODAL E LANÇAMENTO DE ITENS
        function abrirModal(i) {
            idxAtivo = i;
            const conta = db_c[idxAtivo];
            
            document.getElementById('mNome').innerText = conta.nome;
            updateExtrato();
            
            document.getElementById('mGrid').innerHTML = db_p.map(p => `
                <button onclick="addValor('${p.n}', ${p.p})" class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 flex flex-col items-center active:bg-amber-500 active:text-black transition-colors">
                    <span class="text-2xl">${p.i}</span>
                    <span class="text-[8px] font-black uppercase mt-1">${p.n}</span>
                    <span class="font-black text-sm italic text-amber-500">R$ ${p.p}</span>
                </button>`).join('');
            
            document.getElementById('modal').classList.remove('hidden');
        }

        function addValor(nome, preco) {
            db_c[idxAtivo].total += preco;
            db_c[idxAtivo].lista_itens.push(nome);
            updateExtrato();
            save();
            renderContas();
        }

        function updateExtrato() {
            const conta = db_c[idxAtivo];
            document.getElementById('mTotal').innerText = "R$ " + conta.total.toFixed(2);
            
            if(!conta.lista_itens || conta.lista_itens.length === 0) {
                document.getElementById('mExtrato').innerText = "Nenhum item consumido.";
                return;
            }

            // Agrupa itens repetidos: 2x CERVEJA
            const agrupado = {};
            conta.lista_itens.forEach(x => agrupado[x] = (agrupado[x] || 0) + 1);
            const texto = Object.entries(agrupado).map(([n, q]) => `${q}x ${n}`).join(', ');
            
            document.getElementById('mExtrato').innerText = texto;
        }

        // FECHAR CONTA E WHATSAPP
        function finalizar(enviarZap) {
            const conta = db_c[idxAtivo];
            if(conta.total <= 0) return alert("A conta está vazia!");

            const agrupado = {};
            conta.lista_itens.forEach(x => agrupado[x] = (agrupado[x] || 0) + 1);
            const resumoTexto = Object.entries(agrupado).map(([n, q]) => `${q}x ${n}`).join(', ');

            if(enviarZap) {
                const msg = `*--- CONTA DO BAR ---*\n\n👤 Cliente: *${conta.nome}*\n📝 Consumo: ${resumoTexto}\n💰 *VALOR TOTAL: R$ ${conta.total.toFixed(2)}*\n\n_Obrigado pela preferência!_`;
                window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(msg), '_blank');
            }

            // Move para o histórico
            db_h.push({
                id: Date.now(),
                n: conta.nome,
                v: conta.total,
                i: resumoTexto,
                m: mes(),
                t: 'V',
                d: new Date().toLocaleString('pt-BR')
            });

            db_c.splice(idxAtivo, 1);
            save();
            renderContas();
            fecharModal();
        }

        // CAIXA E HISTÓRICO
        function renderCaixa() {
            const meses = [...new Set(db_h.map(h => h.m))];
            if(!meses.includes(mes())) meses.push(mes());
            
            document.getElementById('filtroMeses').innerHTML = meses.map(m => `
                <button onclick="fMes='${m}';renderCaixa()" class="px-4 py-2 rounded-lg text-[9px] font-black ${fMes===m?'bg-amber-500 text-black':'bg-zinc-800 text-zinc-500'} uppercase whitespace-nowrap">${m}</button>
            `).join('');

            const filtrado = db_h.filter(h => h.m === fMes);
            document.getElementById('listaHist').innerHTML = filtrado.slice().reverse().map((h, idx) => {
                const rIdx = db_h.findIndex(item => item.id === h.id);
                return `
                <div onclick="editarHist(${rIdx})" class="p-4 bg-zinc-900 rounded-lg border-l-4 ${h.t==='G'?'border-red-600':'border-green-600'}">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[10px] font-black uppercase text-zinc-300">${h.n}</span>
                        <span class="${h.t==='G'?'text-red-500':'text-green-500'} font-black font-mono">R$ ${h.v.toFixed(2)}</span>
                    </div>
                    <p class="text-[8px] text-zinc-600 font-mono italic">${h.i || 'Sem descrição'}</p>
                    <p class="text-[7px] text-zinc-700 mt-1 uppercase font-bold">${h.d}</p>
                </div>`}).join('');
            resumo();
        }

        function editarHist(idx) {
            const op = prompt("1-Apagar, 0-Sair");
            if(op==="1" && confirm("Apagar registro?")) { db_h.splice(idx,1); save(); renderCaixa(); }
        }

        // CONFIGURAÇÕES DE ITENS
        function renderConfig() {
            document.getElementById('listaProdutos').innerHTML = db_p.map((p, i) => `
                <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 space-y-2">
                    <div class="flex gap-2">
                        <input id="pi-${i}" class="w-10 bg-black p-2 rounded text-center text-xl" value="${p.i}" readonly>
                        <input id="pn-${i}" class="flex-1 bg-black p-2 rounded font-black text-xs uppercase" value="${p.n}">
                        <button onclick="db_p.splice(${i},1);renderConfig()" class="text-red-500 font-bold px-2">X</button>
                    </div>
                    <div class="flex gap-1 overflow-x-auto pb-1">
                        ${emojis.map(e => `<button onclick="document.getElementById('pi-${i}').value='${e}'" class="bg-zinc-800 p-2 rounded text-lg">${e}</button>`).join('')}
                    </div>
                    <input id="pp-${i}" type="number" step="0.01" class="w-full bg-black p-3 rounded font-black text-green-500" value="${p.p}">
                </div>`).join('');
        }

        function salvarItens() {
            db_p.forEach((p, i) => {
                p.i = document.getElementById('pi-'+i).value;
                p.n = document.getElementById('pn-'+i).value;
                p.p = parseFloat(document.getElementById('pp-'+i).value) || 0;
            });
            save(); alert("Cardápio Atualizado!"); tela('vendas');
        }

        function lancarGasto() {
            const n = prompt("Gasto com o quê?"); 
            const v = parseFloat(prompt("Valor?"));
            if(n && v) { db_h.push({id: Date.now(), n: "GASTO: "+n, v: v, m: mes(), t: 'G', d: new Date().toLocaleString('pt-BR')}); save(); renderCaixa(); }
        }

        function novoItem() { db_p.push({i:'🏷️', n:'NOVO', p:0}); renderConfig(); }
        
        function save() {
            localStorage.setItem('bar_p', JSON.stringify(db_p));
            localStorage.setItem('bar_c', JSON.stringify(db_c));
            localStorage.setItem('bar_h', JSON.stringify(db_h));
            resumo();
        }
        
        function resumo() {
            const hMes = db_h.filter(h => h.m === mes());
            const v = hMes.filter(h => h.t === 'V').reduce((a, b) => a + b.v, 0);
            const g = hMes.filter(h => h.t === 'G').reduce((a, b) => a + b.v, 0);
            document.getElementById('totalLucro').innerText = "R$ " + (v - g).toFixed(2);
            document.getElementById('totalGasto').innerText = "R$ " + g.toFixed(2);
            document.getElementById('mesAtual').innerText = mes();
        }
        
        function fecharModal() { document.getElementById('modal').classList.add('hidden'); }
        
        // Inicializar
        renderContas();
    </script>
</body>
</html>
